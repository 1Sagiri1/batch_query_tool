<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地批量查询工作台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <div id="appHealth" class="app-health">前端初始化中...</div>
    <header class="hero">
      <h1>本地批量查询工作台</h1>
      <p>配置、文件导入、SQL 批处理、并行任务与导出都在浏览器本地完成。</p>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>1. 数据库/账号配置</h2>
        <div class="head-actions">
          <button id="addProfileBtn" type="button">新增配置</button>
          <button id="exportProfilesBtn" type="button">导出配置</button>
          <label class="file-btn">
            导入配置
            <input id="importProfilesInput" type="file" accept=".json" multiple>
          </label>
        </div>
      </div>
      <div id="profileTabs" class="tabs"></div>
      <form id="profileForm" class="grid-form">
        <label>配置名<input id="profileName" type="text" required></label>
        <label>数据库类型
          <select id="profileDbType">
            <option value="mysql">MySQL</option>
            <option value="clickhouse">ClickHouse</option>
          </select>
        </label>
        <label>Host<input id="profileHost" type="text" placeholder="127.0.0.1"></label>
        <label>Port<input id="profilePort" type="text" placeholder="3306"></label>
        <label>Username<input id="profileUser" type="text"></label>
        <label>Password<input id="profilePassword" type="password"></label>
        <label>Database<input id="profileDatabase" type="text"></label>
      </form>
      <div class="inline-actions">
        <button id="saveProfileBtn" type="button">保存当前配置</button>
        <button id="testProfileBtn" type="button">连接测试</button>
        <span id="testProfileStatus" class="test-status">未测试</span>
        <button id="deleteProfileBtn" type="button" class="danger">删除当前配置</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>2. 文件导入与列选择</h2>
        <div class="head-actions">
          <label class="file-btn">
            选择文件
            <input id="dataFileInput" type="file" accept=".csv,.xlsx,.xls">
          </label>
        </div>
      </div>
      <div id="dropZone" class="drop-zone">拖拽 CSV/XLSX 文件到这里</div>
      <div class="file-zone-layout">
        <aside class="file-side">
          <div class="inline-actions">
            <span id="fileMeta">未导入文件</span>
          </div>
          <div id="importedFilesList" class="imported-files"></div>
        </aside>
        <div class="file-main">
          <div class="inline-actions">
            <span>标题行:</span>
            <label><input type="radio" name="hasHeader" value="true" checked> 包含标题行</label>
            <label><input type="radio" name="hasHeader" value="false"> 不包含标题行(第一行也参与查询)</label>
          </div>
          <div class="inline-actions">
            <label>预览 Sheet:
              <select id="sheetSelect"></select>
            </label>
            <span id="selectedColumnMeta">未选择列</span>
          </div>
          <div class="table-wrap">
            <table id="previewTable"></table>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>3. 批处理任务</h2>
        <div class="head-actions">
          <button id="addTaskBtn" type="button">新增任务</button>
          <button id="runAllBtn" type="button">并行执行全部任务</button>
          <button id="exportAllXlsxBtn" type="button">导出全部结果(XLSX多Sheet)</button>
        </div>
      </div>
      <div class="global-progress">
        <div class="global-progress-row">
          <strong>整体进度</strong>
          <span id="globalProgressText">0%</span>
        </div>
        <progress id="globalProgressBar" max="100" value="0"></progress>
        <div id="globalProgressMeta" class="global-progress-meta">等待任务启动</div>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script>
    window.__APP_READY = false;
    window.__APP_BOOT_ERROR = "";
    window.addEventListener("error", function (e) {
      // 仅在初始化阶段显示致命错误，避免运行后噪声错误污染顶部状态
      if (window.__APP_READY) return;
      var msg = (e && e.message) ? String(e.message) : "Unknown script error";
      var isOpaqueScriptError = msg === "Script error." && !(e && e.filename);
      if (isOpaqueScriptError) return;
      window.__APP_BOOT_ERROR = msg;
      var el = document.getElementById("appHealth");
      if (el) {
        el.textContent = "前端报错: " + window.__APP_BOOT_ERROR;
        el.className = "app-health err";
      }
    });
    setTimeout(function () {
      var el = document.getElementById("appHealth");
      if (!el) return;
      if (window.__APP_READY) {
        el.textContent = "前端已初始化";
        el.className = "app-health ok";
      } else if (window.__APP_BOOT_ERROR) {
        el.textContent = "前端报错: " + window.__APP_BOOT_ERROR;
        el.className = "app-health err";
      } else {
        el.textContent = "前端未初始化: 请检查 app.js 是否被浏览器拦截或加载失败";
        el.className = "app-health err";
      }
    }, 1500);
  </script>
  <script src="./app.js"></script>
</body>
</html>
